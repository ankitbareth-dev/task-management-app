<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-container">
        <div class="left-section">
          <h1>Task Manager <span>with Insights</span></h1>
        </div>
        <div class="right-section">
          <div class="user-profile">
            <i class="fa-solid fa-circle-user"></i>
            <span>Admin User</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </header>

    <section class="stats-container">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-info">
            <h3>Total Tasks</h3>
            <p class="stat-value">24</p>
            <span class="stat-sub">Across all projects</span>
          </div>
          <div class="stat-icon-box icon-primary">
            <i class="fa-solid fa-list-check"></i>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-info">
            <h3>Completed</h3>
            <p class="stat-value">12</p>
            <span class="stat-sub">Tasks finished</span>
          </div>
          <div class="stat-icon-box icon-success">
            <i class="fa-solid fa-circle-check"></i>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-info">
            <h3>Total Time</h3>
            <p class="stat-value">38h</p>
            <span class="stat-sub">Hours tracked</span>
          </div>
          <div class="stat-icon-box icon-warning">
            <i class="fa-solid fa-clock"></i>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-info">
            <h3>Productivity</h3>
            <p class="stat-value">85%</p>
            <span class="stat-sub status-excellent">Excellent</span>
          </div>
          <div class="stat-icon-box icon-purple">
            <i class="fa-solid fa-chart-line"></i>
          </div>
        </div>
      </div>
    </section>

    <section class="add-task-wrapper">
      <div class="add-task-card">
        <h2>Add New Task</h2>
        <form id="task-form" class="add-task-form">
          <div class="form-group">
            <label for="task-title">Task Title</label>
            <input
              type="text"
              id="task-title"
              placeholder="e.g. Design Homepage UI"
              required
            />
          </div>

          <div class="form-group">
            <label for="task-priority">Priority</label>
            <div class="select-wrapper">
              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="task-time">Time (Hours)</label>
            <input
              type="number"
              id="task-time"
              placeholder="0"
              min="1"
              required
            />
          </div>

          <div class="form-group form-submit">
            <label>&nbsp;</label>
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-plus"></i> Add Task
            </button>
          </div>
        </form>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
